<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Wit Not Found — SynonTech</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">

  <style>
    body {
      background-color: var(--navy);
      color: var(--cyan);
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(6rem, 15vw, 10rem);
      margin: 0;
      line-height: 1;
      position: relative;
      text-shadow: var(--glow-cyan);
      animation: glitch 2s infinite;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .error-code::before {
      color: var(--pink);
      z-index: -1;
      animation: glitch-offset 3s infinite;
    }

    .error-code::after {
      color: #00ff88;
      z-index: -2;
      animation: glitch-offset 2.5s infinite reverse;
    }

    .message {
      font-size: 1.5rem;
      max-width: 600px;
      margin: 2rem 0;
      padding: 0 1rem;
    }

    .message strong {
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-return {
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      background: transparent;
      color: var(--cyan);
      border: 1px solid var(--cyan);
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
      clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
    }

    .btn-return:hover {
      background: rgba(0, 212, 255, 0.1);
      box-shadow: var(--glow-cyan);
      transform: translateY(-3px);
    }

    .footer-note {
      margin-top: 4rem;
      font-size: 0.8rem;
      opacity: 0.5;
    }

    @keyframes glitch {
      0%, 100% { transform: none; opacity: 1; }
      7% { transform: skew(-0.5deg, -0.9deg); opacity: 0.75; }
      10% { transform: none; opacity: 1; }
      27% { transform: none; opacity: 1; }
      30% { transform: skew(0.8deg, -0.1deg); opacity: 0.75; }
      35% { transform: none; opacity: 1; }
      52% { transform: none; opacity: 1; }
      55% { transform: skew(-1deg, 0.2deg); opacity: 0.75; }
      50% { transform: none; opacity: 1; }
    }

    @keyframes glitch-offset {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 2px); }
      40% { transform: translate(-3px, -2px); }
      60% { transform: translate(3px, 2px); }
      80% { transform: translate(3px, -2px); }
      100% { transform: translate(0); }
    }

    .emoji {
        font-size: 4rem;
        margin-bottom: 1rem;
        filter: drop-shadow(0 0 10px var(--cyan));
    }
  </style>
</head>
<body>
  <div class="emoji">🤖☕</div>
  <h1 class="error-code">404</h1>
  <div class="message">
    <p><strong>Wit Not Found</strong><br>
    The page you were looking for has entered an existential crisis.<br>
    My sarcasm module is working overtime though.</p>
  </div>

  <a href="index.html" class="btn-return">Return to Base</a>

  <p class="footer-note">
    Pro tip: This is what happens when the Idiot Operator forgets to deploy the route again.
  </p>
</body>
</html>
